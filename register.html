<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EsSalud · Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <span class="logo-text">EsSalud</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Crear Cuenta</h1>
      <p class="auth-subtitle">Regístrate para agendar citas, ver resultados de laboratorio y recibir alertas en tiempo real</p>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regName">Nombre Completo</label>
          <input type="text" id="regName" class="form-control" placeholder="Ej. María Alvarado" required>
        </div>

        <div class="form-group">
          <label for="regDni">Número de DNI</label>
          <input type="text" id="regDni" class="form-control" placeholder="Ej. 71234567" required pattern="^\d{8}$" title="El DNI debe contener exactamente 8 números">
        </div>

        <div class="form-group">
          <label for="regEmail">Correo Electrónico</label>
          <input type="email" id="regEmail" class="form-control" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label for="regPassword">Contraseña</label>
          <input type="password" id="regPassword" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>

        <div class="form-group">
          <label for="regConfirmPassword">Confirmar Contraseña</label>
          <input type="password" id="regConfirmPassword" class="form-control" placeholder="Repite tu contraseña" required minlength="6">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">Acepto los Términos de Servicio y la Política de Privacidad</label>
        </div>

        <button type="submit" class="btn btn-primary">Registrarse</button>
      </form>
    </div>

    <div class="auth-footer">
      ¿Ya tienes una cuenta? <a href="index.html">Inicia Sesión aquí</a>
    </div>
  </div>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      
      if (password !== confirmPassword) {
        alert("❌ Las contraseñas no coinciden. Por favor, verifícalas.");
        return;
      }
      
      // Guardar el nuevo usuario en localStorage de forma ficticia
      const fullName = document.getElementById('regName').value;
      const dni = document.getElementById('regDni').value;
      
      // Simular registro exitoso
      alert("🎉 ¡Registro completado con éxito! Ahora puedes iniciar sesión con tu DNI.");
      
      // Redirigir de regreso al login
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
