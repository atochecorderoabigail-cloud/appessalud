<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EsSalud · Agendar Cita</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header fade-up">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <span class="logo-text">EsSalud</span>
      </div>
      <div class="header-actions" style="display:flex; gap:10px; align-items:center;">
        <a class="icon-btn" href="alerts.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span style="position:absolute; top:6px; right:6px; width:8px; height:8px; background:#F87171; border-radius:50%;"></span>
        </a>
        <a class="avatar" href="profile.html" id="userAvatar">MA</a>
      </div>
    </div>
    <div class="header-greeting">
      <p class="greeting-label">Agendar cita</p>
      <h1 class="greeting-name">Nueva solicitud</h1>
    </div>
  </header>

  <main class="main">
    <div class="card fade-up delay-1">
      <form id="appointmentForm" onsubmit="confirmNewAppointment(event)">
        <!-- Especialidad -->
        <div style="margin-bottom: 20px;">
          <label style="font-weight:600; font-size:13px; color:var(--gray-800); display:block; margin-bottom: 6px;">Especialidad</label>
          <select id="specialty" onchange="handleSpecialtyChange()" style="width:100%; padding:14px; border-radius:16px; border:1px solid var(--gray-200); font-family: var(--font-body); font-size: 14px; color: var(--gray-800); background: var(--gray-50); outline: none; transition: border-color 0.2s;" required>
            <option value="" disabled selected>Seleccione especialidad</option>
            <option value="Medicina Interna">Medicina Interna</option>
            <option value="Cardiología">Cardiología</option>
            <option value="Neurología">Neurología</option>
            <option value="Pediatría">Pediatría</option>
          </select>
        </div>

        <!-- Médico (Dinámico según Especialidad) -->
        <div style="margin-bottom: 20px;">
          <label style="font-weight:600; font-size:13px; color:var(--gray-800); display:block; margin-bottom: 6px;">Médico Especialista</label>
          <select id="doctorSelect" style="width:100%; padding:14px; border-radius:16px; border:1px solid var(--gray-200); font-family: var(--font-body); font-size: 14px; color: var(--gray-800); background: var(--gray-50); outline: none;" required disabled>
            <option value="" disabled selected>Primero elija la especialidad</option>
          </select>
        </div>

        <!-- Fecha -->
        <div style="margin-bottom: 20px;">
          <label style="font-weight:600; font-size:13px; color:var(--gray-800); display:block; margin-bottom: 6px;">Fecha</label>
          <input type="date" id="apptDate" style="width:100%; padding:14px; border-radius:16px; border:1px solid var(--gray-200); font-family: var(--font-body); font-size: 14px; color: var(--gray-800); background: var(--gray-50); outline: none;" required>
        </div>

        <!-- Hora -->
        <div style="margin-bottom: 24px;">
          <label style="font-weight:600; font-size:13px; color:var(--gray-800); display:block; margin-bottom: 6px;">Hora</label>
          <input type="time" id="apptTime" style="width:100%; padding:14px; border-radius:16px; border:1px solid var(--gray-200); font-family: var(--font-body); font-size: 14px; color: var(--gray-800); background: var(--gray-50); outline: none;" required>
        </div>

        <!-- Botón de Envío -->
        <button type="submit" style="background:var(--blue-600); color:white; border:none; padding:16px; border-radius:30px; width:100%; font-weight:600; font-size: 15px; font-family:var(--font-body); cursor:pointer; box-shadow: var(--shadow-blue); transition: all 0.2s;">
          Solicitar cita
        </button>
      </form>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="appointments.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <span class="nav-label">Citas</span>
    </a>
    <a href="new_appointment.html" class="nav-center-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </a>
    <a href="alerts.html" class="nav-item" style="position:relative">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <span class="nav-badge">12</span>
      <span class="nav-label">Alertas</span>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="nav-label">Perfil</span>
    </a>
  </nav>

  <script>
    // Configurar avatar de cabecera
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (user && user.name) {
      const initials = user.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
    }

    // Datos estáticos de médicos por especialidad
    const doctorsBySpecialty = {
      "Medicina Interna": [
        { name: "Dr. Luis Fernández", avatar: "LF", color: "#2563EB", consultorio: "204" }
      ],
      "Cardiología": [
        { name: "Dra. Ana Gómez", avatar: "AG", color: "#EC4899", consultorio: "308" }
      ],
      "Neurología": [
        { name: "Dr. Carlos Ruiz", avatar: "CR", color: "#8B5CF6", consultorio: "112" }
      ],
      "Pediatría": [
        { name: "Dra. Paola Díaz", avatar: "PD", color: "#F97316", consultorio: "205" }
      ]
    };

    // Cambiar la lista de médicos según especialidad seleccionada
    function handleSpecialtyChange() {
      const specSelect = document.getElementById('specialty');
      const docSelect = document.getElementById('doctorSelect');
      const selectedSpec = specSelect.value;

      docSelect.innerHTML = '';
      docSelect.disabled = false;

      const doctors = doctorsBySpecialty[selectedSpec] || [];
      doctors.forEach(doc => {
        const option = document.createElement('option');
        option.value = doc.name;
        option.textContent = doc.name;
        docSelect.appendChild(option);
      });
    }

    // Confirmación y guardado
    function confirmNewAppointment(event) {
      event.preventDefault();

      const specialty = document.getElementById('specialty').value;
      const doctorName = document.getElementById('doctorSelect').value;
      const date = document.getElementById('apptDate').value;
      const time = document.getElementById('apptTime').value;

      // Obtener datos del médico seleccionado
      const doctors = doctorsBySpecialty[specialty] || [];
      const doctorDetails = doctors.find(d => d.name === doctorName) || { avatar: "DM", color: "#3B82F6", consultorio: "101" };

      // Cargar citas actuales
      let citasData = JSON.parse(localStorage.getItem('citasData')) || [];
      
      // Crear nueva cita
      const newAppt = {
        id: citasData.length + 1,
        doctor: doctorName,
        especialidad: specialty,
        fecha: date,
        hora: time,
        estado: "pendiente",
        consultorio: doctorDetails.consultorio,
        avatar: doctorDetails.avatar,
        color: doctorDetails.color
      };

      // Guardar en localStorage
      citasData.unshift(newAppt); // Agregar al inicio de la lista
      localStorage.setItem('citasData', JSON.stringify(citasData));

      alert("✅ Cita solicitada correctamente. Recibirás confirmación en breve.");
      window.location.href = 'appointments.html';
    }

    // Restringir la selección de fechas a partir de hoy
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('apptDate').min = today;

    // Procesar parámetros de URL si provienen del buscador de médicos
    const urlParams = new URLSearchParams(window.location.search);
    const specParam = urlParams.get('specialty');
    const docParam = urlParams.get('doctor');

    if (specParam) {
      const specSelect = document.getElementById('specialty');
      specSelect.value = decodeURIComponent(specParam);
      handleSpecialtyChange(); // Carga los médicos correspondientes
      
      if (docParam) {
        const docSelect = document.getElementById('doctorSelect');
        docSelect.value = decodeURIComponent(docParam);
      }
    }
  </script>
</body>
</html>
