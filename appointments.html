<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EsSalud · Citas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header fade-up">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <span class="logo-text">EsSalud</span>
      </div>
      <div class="header-actions" style="display:flex; gap:10px; align-items:center;">
        <a class="icon-btn" href="alerts.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span style="position:absolute; top:6px; right:6px; width:8px; height:8px; background:#F87171; border-radius:50%;"></span>
        </a>
        <a class="avatar" href="profile.html" id="userAvatar">MA</a>
      </div>
    </div>
    <div class="header-greeting">
      <p class="greeting-label">Gestión de Citas</p>
      <h1 class="greeting-name">Mis próximas citas</h1>
    </div>
  </header>

  <main class="main">
    <!-- Filter Chips -->
    <div style="display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;">
      <span class="filter-chip active" id="chip-all" onclick="filterAppointments('all')">Todas</span>
      <span class="filter-chip" id="chip-pending" onclick="filterAppointments('pendiente')">Pendientes</span>
      <span class="filter-chip" id="chip-confirmed" onclick="filterAppointments('confirmada')">Confirmadas</span>
    </div>

    <!-- Appointments list container -->
    <div id="appointments-list">
      <!-- Las citas se renderizan dinámicamente -->
    </div>

    <a href="new_appointment.html" class="card" style="text-align:center; margin-top:16px; font-weight: 600; color: var(--blue-600); display: block; text-decoration: none; border: 1.5px dashed var(--blue-100); padding: 18px;">
      + Solicitar nueva cita
    </a>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="appointments.html" class="nav-item active">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <span class="nav-label">Citas</span>
    </a>
    <a href="new_appointment.html" class="nav-center-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </a>
    <a href="alerts.html" class="nav-item" style="position:relative">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <span class="nav-badge">12</span>
      <span class="nav-label">Alertas</span>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="nav-label">Perfil</span>
    </a>
  </nav>

  <script>
    // Configurar avatar de cabecera
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (user && user.name) {
      const initials = user.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
    }

    // Inicializar citas en localStorage si no existen
    let citasData = JSON.parse(localStorage.getItem('citasData'));
    if (!citasData) {
      citasData = [
        { id:1, doctor:"Dr. Luis Fernández", especialidad:"Medicina Interna", fecha:"2026-05-15", hora:"10:00", estado:"confirmada", consultorio:"204", avatar:"LF", color:"#2563EB" },
        { id:2, doctor:"Dra. Ana Gómez", especialidad:"Cardiología", fecha:"2026-05-18", hora:"11:30", estado:"confirmada", consultorio:"308", avatar:"AG", color:"#EC4899" },
        { id:3, doctor:"Dr. Carlos Ruiz", especialidad:"Neurología", fecha:"2026-05-20", hora:"09:00", estado:"pendiente", consultorio:"112", avatar:"CR", color:"#8B5CF6" },
        { id:4, doctor:"Dra. Paola Díaz", especialidad:"Pediatría", fecha:"2026-05-22", hora:"14:00", estado:"pendiente", consultorio:"205", avatar:"PD", color:"#F97316" }
      ];
      localStorage.setItem('citasData', JSON.stringify(citasData));
    }

    // Formatear fechas para mostrar, ej. "2026-05-15" a "15 May"
    function formatFecha(fechaStr) {
      if (fechaStr.includes('-')) {
        const parts = fechaStr.split('-');
        if (parts.length === 3) {
          const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Set", "Oct", "Nov", "Dic"];
          const dia = parseInt(parts[2]);
          const mesIndex = parseInt(parts[1]) - 1;
          return `${dia} ${meses[mesIndex] || 'May'}`;
        }
      }
      return fechaStr;
    }

    // Renderizar la lista
    function renderAppointmentsList(filter = 'all') {
      const filtered = filter === 'all' ? citasData : citasData.filter(c => c.estado === filter);
      const container = document.getElementById('appointments-list');
      if(!container) return;
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:30px; color:var(--gray-400);">
            <div style="font-size:36px; margin-bottom:12px;">📅</div>
            <p style="font-size:14px; font-weight:500;">No tienes citas ${filter === 'pendiente' ? 'pendientes' : 'confirmadas'} en este momento.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(c => `
        <div class="card" style="margin-bottom:12px; animation: fadeUp 0.3s ease both;">
          <div style="display:flex; gap:14px; align-items:center;">
            <div class="doctor-avatar-sm" style="background:${c.color || '#3B82F6'};">${c.avatar || 'DM'}</div>
            <div style="flex:1;">
              <div style="font-weight:600;">${c.doctor}</div>
              <div style="font-size:12px; color:var(--gray-400); font-weight: 500;">${c.especialidad}</div>
              <div style="font-size:12px; margin-top:4px; font-weight: 500; color: var(--gray-600);">
                ${formatFecha(c.fecha)} · ${c.hora} | Consultorio ${c.consultorio}
              </div>
            </div>
            <span class="badge ${c.estado === 'confirmada' ? 'badge--green' : 'badge--amber'}">
              ${c.estado === 'confirmada' ? 'Confirmada' : 'Pendiente'}
            </span>
          </div>
        </div>
      `).join('');
    }

    // Activar filtros al hacer click
    window.filterAppointments = (filter) => {
      renderAppointmentsList(filter);
      
      // Actualizar estilo activo de los chips
      document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
      if (filter === 'all') document.getElementById('chip-all').classList.add('active');
      else if (filter === 'pendiente') document.getElementById('chip-pending').classList.add('active');
      else if (filter === 'confirmada') document.getElementById('chip-confirmed').classList.add('active');
    };

    // Renderizado inicial
    renderAppointmentsList('all');
  </script>
</body>
</html>
