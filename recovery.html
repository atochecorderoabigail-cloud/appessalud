<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EsSalud · Recuperar Contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <span class="logo-text">EsSalud</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Recuperar Contraseña</h1>
      <p class="auth-subtitle">Ingresa tus datos registrados para enviarte un enlace seguro de restablecimiento de contraseña</p>

      <form id="recoveryForm" onsubmit="handleRecovery(event)">
        <div class="form-group">
          <label for="recDni">Número de DNI</label>
          <input type="text" id="recDni" class="form-control" placeholder="Ej. 71234567" required pattern="^\d{8}$" title="El DNI debe contener exactamente 8 números">
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
          <label for="recEmail">Correo Electrónico Registrado</label>
          <input type="email" id="recEmail" class="form-control" placeholder="correo@ejemplo.com" required>
        </div>

        <button type="submit" class="btn btn-primary">Enviar enlace de recuperación</button>
      </form>
    </div>

    <div class="auth-footer">
      ¿Recordaste tu contraseña? <a href="index.html">Inicia Sesión aquí</a>
    </div>
  </div>

  <script>
    function handleRecovery(event) {
      event.preventDefault();
      
      const email = document.getElementById('recEmail').value;
      
      // Simular el envío del correo electrónico
      alert(`📩 Se ha enviado un enlace de recuperación a ${email}. Por favor, revisa tu bandeja de entrada.`);
      
      // Redirigir de regreso al login
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
