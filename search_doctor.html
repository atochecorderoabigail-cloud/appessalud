<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EsSalud · Directorio Médico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header fade-up">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <span class="logo-text">EsSalud</span>
      </div>
      <div class="header-actions" style="display:flex; gap:10px; align-items:center;">
        <a class="icon-btn" href="alerts.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span style="position:absolute; top:6px; right:6px; width:8px; height:8px; background:#F87171; border-radius:50%;"></span>
        </a>
        <a class="avatar" href="profile.html" id="userAvatar">MA</a>
      </div>
    </div>
    <div class="header-greeting">
      <p class="greeting-label">Directorio médico</p>
      <h1 class="greeting-name">Especialistas disponibles</h1>
    </div>
  </header>

  <main class="main">
    <!-- Search Bar Card -->
    <div class="card" style="margin-bottom:16px; padding: 8px 16px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" style="flex-shrink: 0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Buscar por nombre o especialidad..." style="width:100%; padding:10px 0; border:none; background:transparent; font-family:var(--font-body); font-size:14px; color:var(--gray-800); outline:none;">
      </div>
    </div>

    <!-- Doctors list container -->
    <div id="doctorsList">
      <!-- Los médicos se renderizan dinámicamente -->
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="appointments.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <span class="nav-label">Citas</span>
    </a>
    <a href="new_appointment.html" class="nav-center-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </a>
    <a href="alerts.html" class="nav-item" style="position:relative">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <span class="nav-badge">12</span>
      <span class="nav-label">Alertas</span>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="nav-label">Perfil</span>
    </a>
  </nav>

  <script>
    // Configurar avatar de cabecera
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (user && user.name) {
      const initials = user.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
    }

    const doctorsData = [
      { name: "Dr. Luis Fernández", spec: "Medicina Interna", rating: "4.9", status: "Disponible", badge: "green", avatar: "LF", color: "#2563EB" },
      { name: "Dra. Ana Gómez", spec: "Cardiología", rating: "4.8", status: "Disponible", badge: "green", avatar: "AG", color: "#EC4899" },
      { name: "Dr. Carlos Ruiz", spec: "Neurología", rating: "4.7", status: "En consulta", badge: "red", avatar: "CR", color: "#8B5CF6" },
      { name: "Dra. Paola Díaz", spec: "Pediatría", rating: "4.9", status: "Ausente", badge: "amber", avatar: "PD", color: "#F97316" },
      { name: "Dr. Miguel Herrera", spec: "Traumatología", rating: "4.6", status: "Disponible", badge: "green", avatar: "MH", color: "#0D9488" }
    ];

    function renderDoctors(list) {
      const container = document.getElementById('doctorsList');
      if (list.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:30px; color:var(--gray-400);">
            <div style="font-size:36px; margin-bottom:12px;">👨‍⚕️</div>
            <p style="font-size:14px; font-weight:500;">No se encontraron especialistas coincidentes.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = list.map(doc => `
        <div class="card" style="margin-bottom:12px; cursor:pointer;" onclick="redirectToBooking('${encodeURIComponent(doc.name)}', '${encodeURIComponent(doc.spec)}')">
          <div style="display:flex; gap:14px; align-items:center;">
            <div class="doctor-avatar-sm" style="background:${doc.color};">${doc.avatar}</div>
            <div style="flex:1;">
              <div style="font-weight:600;">${doc.name}</div>
              <div style="font-size:12px; color:var(--gray-600); font-weight: 500;">${doc.spec}</div>
              <div style="font-size:11px; margin-top: 2px; color: var(--gray-400); font-weight: 600;">★ ${doc.rating}</div>
            </div>
            <span class="badge badge--${doc.badge}">${doc.status}</span>
          </div>
        </div>
      `).join('');
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = doctorsData.filter(doc => 
        doc.name.toLowerCase().includes(query) || 
        doc.spec.toLowerCase().includes(query)
      );
      renderDoctors(filtered);
    }

    function redirectToBooking(name, spec) {
      window.location.href = `new_appointment.html?doctor=${name}&specialty=${spec}`;
    }

    // Renderizar inicialmente todos
    renderDoctors(doctorsData);
  </script>
</body>
</html>
